<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0c4a6e" />
    <title>救助連携シミュレーター</title>
  </head>
  <body class="bg-slate-900 text-white overflow-hidden">
    <canvas id="scene" class="fixed inset-0 w-full h-full touch-none"></canvas>

    <!-- 上部：フェーズ表示 -->
    <header class="fixed top-0 inset-x-0 p-3 pointer-events-none">
      <div class="mx-auto max-w-md bg-black/50 backdrop-blur rounded-xl px-4 py-2 text-center pointer-events-auto">
        <div class="text-xs text-cyan-300">現在フェーズ</div>
        <div id="phase" class="text-base font-semibold">待機中</div>
      </div>
    </header>

    <!-- 凡例 -->
    <aside class="fixed top-20 left-3 bg-black/50 backdrop-blur rounded-lg p-2 text-xs space-y-1">
      <div><span class="inline-block w-3 h-3 rounded-sm align-middle mr-1" style="background:#ef4444"></span>本部</div>
      <div><span class="inline-block w-3 h-3 rounded-sm align-middle mr-1" style="background:#fb923c"></span>チューブ</div>
      <div><span class="inline-block w-3 h-3 rounded-sm align-middle mr-1" style="background:#facc15"></span>ボード</div>
      <div><span class="inline-block w-3 h-3 rounded-sm align-middle mr-1" style="background:#e879f9"></span>IRB</div>
      <div><span class="inline-block w-3 h-3 rounded-sm align-middle mr-1" style="background:#22d3ee"></span>PWC</div>
      <div><span class="inline-block w-3 h-3 rounded-sm align-middle mr-1" style="background:#4ade80"></span>ドローン</div>
      <div><span class="inline-block w-3 h-3 rounded-sm align-middle mr-1" style="background:#ffffff"></span>溺者</div>
    </aside>

    <!-- 下部：操作 -->
    <footer class="fixed bottom-0 inset-x-0 p-4 pb-[calc(env(safe-area-inset-bottom)+1rem)]">
      <div class="mx-auto max-w-md flex gap-2 justify-center">
        <button id="play" class="flex-1 bg-emerald-500 active:bg-emerald-600 rounded-xl py-3 font-semibold touch-manipulation">再生</button>
        <button id="pause" class="flex-1 bg-amber-500 active:bg-amber-600 rounded-xl py-3 font-semibold touch-manipulation">一時停止</button>
        <button id="reset" class="flex-1 bg-slate-600 active:bg-slate-700 rounded-xl py-3 font-semibold touch-manipulation">リセット</button>
      </div>
      <div class="mx-auto max-w-md mt-2 text-center text-xs text-slate-300">
        経過 <span id="time">0.0</span> 秒
      </div>
    </footer>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
